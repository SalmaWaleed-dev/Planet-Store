<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Plants - Plant Store</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }

        
        .container {
            max-width: 1100px;
            margin: 40px auto; 
            padding: 40px 20px;
            border-top: 1px solid #1b4332;
            border-bottom: 1px solid #1b4332;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 50px; 
        }

        .product-card {
            display: flex;
            flex-direction: column;
        }

        .image-box {
    position: relative;
    width: 100%;
    height: 500px; 
    background-color: #f9f9f9;
    border-radius: 5px;
    overflow: hidden;
}

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover; 
    object-position: center; 
}

        .heart-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            background: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #1b4332;
            text-decoration: none;
            font-size: 20px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            font-size: 16px;
            color: #555;
            font-family: Arial, sans-serif;
        }

        .price {
            font-weight: bold;
            color: #000;
        }

        .buy-now {
            background-color: #1b4332;
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            transition: 0.3s;
        }

        .buy-now:hover {
            background-color: #2d5a44;
        }

        
        @media (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr); 
                gap: 30px;
            }
        }

        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
